[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
log_cli = true
log_cli_level = INFO
log_level = INFO
# Timeout protection: kill hanging tests
timeout = 120
# Don't timeout during fixture setup/teardown (cleanup might take time)
timeout_method = thread
